document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Team Signature Builder · Thirty Madison Ventures<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n  :root {\n    --accent: #FF0081;   /* LOCKED brand accent */\n    --ink: #111111;\n    --muted: #6B6B6B;\n    --bg: #F5F5F5;\n    --line: #e5e5e5;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: var(--bg);\n    font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n  }\n  body[data-mode=\"builder\"] #recipient { display: none; }\n  body[data-mode=\"recipient\"] #builder { display: none; }\n  body[data-mode=\"recipient\"] { background: #fff; }\n\n  /* ============================ LAYOUT SHELLS ============================ */\n  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px 72px; }\n\n  .topbar {\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 24px; margin-bottom: 28px; flex-wrap: wrap;\n  }\n  .topbar .brand { display: flex; align-items: center; gap: 14px; }\n  .topbar .brand img { height: 30px; width: auto; display: block; }\n  .topbar .tag {\n    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #999;\n    border-left: 1px solid var(--line); padding-left: 14px;\n  }\n\n  /* ============================ BUILDER ============================ */\n  .builder-grid {\n    display: grid;\n    grid-template-columns: 380px 1fr;\n    gap: 28px;\n    align-items: start;\n  }\n  @media (max-width: 920px) { .builder-grid { grid-template-columns: 1fr; } }\n\n  .panel {\n    background: #fff; border: 1px solid var(--line); border-radius: 14px;\n    padding: 22px 22px 24px;\n  }\n  .panel h2 {\n    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;\n    color: #888; margin: 0 0 18px; font-weight: 700;\n  }\n  .field { margin-bottom: 14px; }\n  .field label {\n    display: block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n    color: #999; margin-bottom: 5px; font-weight: 700;\n  }\n  .field input[type=\"text\"], .field input[type=\"email\"], .field input[type=\"tel\"] {\n    width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);\n    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;\n    background: #fafafa;\n  }\n  .field input:focus { outline: 2px solid rgba(255,0,129,0.3); outline-offset: 1px; background:#fff; }\n  .field .hint { font-size: 11px; color: #aaa; margin-top: 4px; }\n  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n\n  /* crop editor */\n  .crop-block { display: flex; gap: 16px; align-items: center; margin-bottom: 6px; }\n  .stage {\n    position: relative; width: 132px; height: 132px; border-radius: 50%;\n    overflow: hidden; background: #eee; cursor: grab; flex: 0 0 auto;\n    box-shadow: 0 0 0 1px rgba(0,0,0,0.08); user-select: none;\n  }\n  .stage:active { cursor: grabbing; }\n  .stage.empty::after {\n    content: \"Drop / upload photo\"; position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center; text-align:center;\n    font-size: 11px; color: #999; padding: 0 18px; line-height: 1.4;\n  }\n  .stage img {\n    position: absolute; top: 0; left: 0; transform-origin: 0 0;\n    pointer-events: none; max-width: none; filter: grayscale(100%);\n  }\n  .crop-controls { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }\n  .crop-controls .zoomrow { display: flex; align-items: center; gap: 10px; }\n  .crop-controls .zoomrow span { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color:#999; }\n  input[type=\"range\"] { flex: 1; accent-color: var(--accent); }\n  .filebtn {\n    display: inline-block; font-size: 12px; font-weight: 600; cursor: pointer;\n    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; background:#fff;\n    text-align: center;\n  }\n  .filebtn:hover { border-color: #bbb; }\n  .filebtn input { display: none; }\n  .photo-note { font-size: 11px; color:#aaa; line-height:1.5; }\n\n  /* generate */\n  .gen-btn {\n    width: 100%; background: var(--accent); color:#fff; border:0; cursor:pointer;\n    font-family: inherit; font-size: 14px; font-weight: 700; letter-spacing: 0.02em;\n    padding: 13px; border-radius: 999px; margin-top: 6px;\n  }\n  .gen-btn:hover { filter: brightness(0.95); }\n  .gen-btn:disabled { background:#ddd; cursor: not-allowed; }\n\n  .linkout { margin-top: 16px; display: none; }\n  .linkout.show { display: block; }\n  .linkout .linkrow { display: flex; gap: 8px; }\n  .linkout input {\n    flex: 1; font-family: ui-monospace, monospace; font-size: 12px;\n    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background:#fafafa; color:#444;\n    min-width: 0;\n  }\n  .btn-dark {\n    background:#111; color:#fff; border:0; cursor:pointer; font-family:inherit;\n    font-size:13px; font-weight:600; padding:10px 16px; border-radius:8px; white-space:nowrap;\n  }\n  .btn-dark:hover { opacity:0.9; }\n  .btn-ghost {\n    background:#fff; color:#111; border:1px solid var(--line); cursor:pointer; font-family:inherit;\n    font-size:13px; font-weight:600; padding:10px 16px; border-radius:8px; white-space:nowrap;\n  }\n  .btn-ghost:hover { border-color:#bbb; }\n  .linkout .meta { font-size: 11px; color:#aaa; margin-top: 8px; display:flex; gap:14px; flex-wrap:wrap; }\n  .linkout .actions2 { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }\n\n  /* preview column */\n  .preview-col { position: sticky; top: 24px; }\n  .preview-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color:#999; margin: 2px 0 12px; font-weight:700; }\n\n  /* roster */\n  .roster { margin-top: 22px; }\n  .roster h2 { display:flex; align-items:center; justify-content:space-between; }\n  .roster h2 button { font-size:10px; letter-spacing:0.06em; }\n  .roster ul { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }\n  .roster li {\n    display:flex; align-items:center; gap:12px; border:1px solid var(--line);\n    border-radius:10px; padding:9px 12px; background:#fff;\n  }\n  .roster li .rname { font-weight:700; font-size:13px; }\n  .roster li .rrole { font-size:12px; color:var(--muted); }\n  .roster li .grow { flex:1; min-width:0; overflow:hidden; }\n  .roster li .rrole, .roster li .rname { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n  .roster li button { font-size:11px; padding:7px 10px; }\n  .roster .empty { font-size:12px; color:#aaa; padding: 4px 0; }\n  .roster li .pill { font-size:10px; color:#fff; background:var(--accent); border-radius:999px; padding:2px 8px; font-weight:700; letter-spacing:0.04em; }\n\n  /* ============================ RECIPIENT ============================ */\n  .recip-hero { text-align:center; max-width: 720px; margin: 8px auto 4px; }\n  .recip-hero .kicker { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); font-weight:700; margin-bottom:14px; }\n  .recip-hero h1 { font-size: 30px; letter-spacing:0.01em; margin: 0 0 10px; font-weight:800; }\n  .recip-hero p { font-size:15px; color:var(--muted); line-height:1.6; margin: 0; }\n  .recip-sig-wrap { display:flex; justify-content:center; margin: 30px 0 8px; }\n  .recip-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin: 18px 0 30px; }\n  .recip-actions button {\n    border:0; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700;\n    padding:13px 22px; border-radius:999px; letter-spacing:0.01em;\n  }\n  .recip-actions .primary { background: var(--accent); color:#fff; }\n  .recip-actions .secondary { background:#fff; color:#111; border:1px solid var(--line); }\n  .recip-actions button:hover { filter:brightness(0.96); }\n\n  .howto { max-width: 720px; margin: 0 auto; border-top:1px solid var(--line); padding-top:28px; }\n  .howto h3 { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#999; margin:0 0 16px; font-weight:700; }\n  .howto .cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; }\n  @media (max-width:680px){ .howto .cols { grid-template-columns:1fr; } }\n  .howto .cols h4 { font-size:14px; margin:0 0 8px; font-weight:700; }\n  .howto ol { margin:0; padding-left:18px; font-size:13px; color:var(--muted); line-height:1.7; }\n\n  /* ============================ THE SIGNATURE ============================ */\n  .sig {\n    background:#fff; width: 1100px; max-width:100%; padding: 56px 60px; color:var(--ink);\n    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 12px 40px -12px rgba(0,0,0,0.1);\n    border-radius: 6px; border:1px solid #f0f0f0;\n  }\n  .sig-row {\n    display:grid; grid-template-columns: 200px 1.05fr 1.5px 1.2fr;\n    column-gap: 34px; align-items:center;\n  }\n  .sig .photo {\n    width:184px; height:184px; border-radius:50%; overflow:hidden;\n    background:#e6e6e6; box-shadow:0 0 0 1px rgba(0,0,0,0.05); position:relative;\n  }\n  .sig .photo img { width:100%; height:100%; object-fit:cover; display:block; }\n  .sig .photo.empty::after {\n    content:\"PHOTO\"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;\n    font-size:12px; letter-spacing:0.1em; color:#bbb;\n  }\n  .sig .name { font-weight:800; font-size:29px; letter-spacing:0.03em; margin:0 0 12px; line-height:1.05; }\n  .sig .role { font-size:15px; color:var(--accent); margin:0 0 7px; font-weight:700; letter-spacing:0.13em; text-transform:uppercase; }\n  .sig .dept { font-size:14px; color:var(--muted); margin:0 0 7px; font-weight:500; }\n  .sig .company { font-size:17px; color:var(--ink); margin:0; font-weight:600; }\n  .sig .vrule { width:1.5px; height:172px; background:var(--accent); align-self:center; }\n  .sig .contact { display:flex; flex-direction:column; gap:14px; padding-left:8px; }\n  .sig .contact .item {\n    display:flex; align-items:center; gap:13px; font-size:16px; color:var(--muted);\n    text-decoration:none; line-height:1.2;\n  }\n  .sig .contact .item.link { color:var(--accent); font-weight:700; }\n  .sig .contact .item .ico { flex:0 0 auto; width:22px; display:inline-flex; align-items:center; justify-content:center; }\n  .sig .contact .cta {\n    display:inline-flex; align-items:center; gap:9px; align-self:flex-start; margin-top:4px;\n    background:var(--accent); color:#fff; text-decoration:none; font-weight:700;\n    font-size:13px; letter-spacing:0.08em; text-transform:uppercase; padding:11px 18px; border-radius:999px;\n  }\n  .sig .contact .cta .ico { width:18px; display:inline-flex; }\n  .sig .hrule { height:1.5px; background:var(--accent); margin:32px 0 28px; border:0; }\n  .sig .logo { width:340px; max-width:100%; display:block; }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-mode=\"builder\">\n\n  <!-- ================= BUILDER (admin) ================= -->\n  <div id=\"builder\">\n    <div class=\"wrap\">\n      <div class=\"topbar\">\n        <div class=\"brand\">\n          <img id=\"brand-logo\" alt=\"Thirty Madison Ventures\">\n          <span class=\"tag\">Team Signature Builder<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"tag\" style=\"border:0;padding:0;\">Make a link · send it · they copy<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"builder-grid\">\n        <!-- LEFT: form -->\n        <div>\n          <div class=\"panel\">\n            <h2>Teammate details<\u002Fh2>\n            <div class=\"field\">\n              <label for=\"f-name\">Full name<\u002Flabel>\n              <input type=\"text\" id=\"f-name\" placeholder=\"Brittney Lima\">\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label for=\"f-role\">Title / role<\u002Flabel>\n              <input type=\"text\" id=\"f-role\" placeholder=\"Director of Operations\">\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label for=\"f-dept\">Department / team <span style=\"text-transform:none;color:#ccc;font-weight:400;\">(optional)<\u002Fspan><\u002Flabel>\n              <input type=\"text\" id=\"f-dept\" placeholder=\"Operations\">\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label for=\"f-email\">Email<\u002Flabel>\n              <input type=\"email\" id=\"f-email\" placeholder=\"brittney@thirtymadisonventures.com\">\n            <\u002Fdiv>\n            <div class=\"two-col\">\n              <div class=\"field\">\n                <label for=\"f-phone\">Phone <span style=\"text-transform:none;color:#ccc;font-weight:400;\">(optional)<\u002Fspan><\u002Flabel>\n                <input type=\"tel\" id=\"f-phone\" placeholder=\"(405) 835-3697\">\n              <\u002Fdiv>\n              <div class=\"field\">\n                <label for=\"f-linkedin\">LinkedIn <span style=\"text-transform:none;color:#ccc;font-weight:400;\">(optional)<\u002Fspan><\u002Flabel>\n                <input type=\"text\" id=\"f-linkedin\" placeholder=\"in/brittney-lima\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label for=\"f-booking\">Book-a-call link <span style=\"text-transform:none;color:#ccc;font-weight:400;\">(optional)<\u002Fspan><\u002Flabel>\n              <input type=\"text\" id=\"f-booking\" placeholder=\"calendly.com/brittney/30min\">\n              <div class=\"hint\">Adds a “Book a call with me” button to the signature.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"field\" style=\"margin-top:6px;\">\n              <label>Photo <span style=\"text-transform:none;color:#ccc;font-weight:400;\">— drag to reposition, scroll or slider to zoom · auto B&amp;W<\u002Fspan><\u002Flabel>\n              <div class=\"crop-block\">\n                <div class=\"stage empty\" id=\"stage\" title=\"Drag to reposition · scroll to zoom\">\n                  <img id=\"src-img\" alt=\"\">\n                <\u002Fdiv>\n                <div class=\"crop-controls\">\n                  <label class=\"filebtn\">Upload photo\n                    <input type=\"file\" id=\"file\" accept=\"image/*\">\n                  <\u002Flabel>\n                  <div class=\"zoomrow\"><span>Zoom<\u002Fspan><input type=\"range\" id=\"zoom\" min=\"0.05\" max=\"3\" step=\"0.001\" value=\"0.4\"><\u002Fdiv>\n                  <div class=\"photo-note\">B&amp;W treatment is applied automatically to keep the team consistent.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"field\" style=\"margin-top:8px;padding-top:16px;border-top:1px dashed var(--line);\">\n              <label for=\"f-base\">Published URL <span style=\"text-transform:none;color:#ccc;font-weight:400;\">— where this file lives online<\u002Fspan><\u002Flabel>\n              <input type=\"text\" id=\"f-base\" placeholder=\"https://yourteam.com/signature.html\">\n              <div class=\"hint\" id=\"base-hint\">Set this once. Share links are built from it, so they open for your teammates instead of this private editor.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <button class=\"gen-btn\" id=\"gen-btn\">Generate share link<\u002Fbutton>\n\n            <div class=\"linkout\" id=\"linkout\">\n              <div class=\"linkrow\">\n                <input type=\"text\" id=\"link-field\" readonly=\"\">\n                <button class=\"btn-dark\" id=\"copy-link\">Copy link<\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"actions2\">\n                <button class=\"btn-ghost\" id=\"open-preview\">Preview what they'll see ↗<\u002Fbutton>\n                <button class=\"btn-ghost\" id=\"save-roster\">Add to my list<\u002Fbutton>\n                <button class=\"btn-ghost\" id=\"clear-form\">Clear &amp; start next<\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"meta\">\n                <span id=\"link-size\"><\u002Fspan>\n                <span>The photo travels inside the link — no upload needed on their end.<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- roster / progress list -->\n          <div class=\"panel roster\" id=\"roster\">\n            <h2>People I've made <button class=\"btn-ghost\" id=\"clear-roster\" style=\"padding:5px 9px;\">Clear all<\u002Fbutton><\u002Fh2>\n            <ul id=\"roster-list\"><\u002Ful>\n            <div class=\"empty\" id=\"roster-empty\">No links yet. Generate one above and click “Add to my list” to track who's done.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- RIGHT: live preview -->\n        <div class=\"preview-col\">\n          <div class=\"preview-label\">Live preview<\u002Fdiv>\n          <div id=\"preview-sig\" class=\"sig\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= RECIPIENT ================= -->\n  <div id=\"recipient\">\n    <div class=\"wrap\">\n      <div class=\"recip-hero\">\n        <div class=\"kicker\">Thirty Madison Ventures<\u002Fdiv>\n        <h1 id=\"recip-greeting\">Here's your email signature<\u002Fh1>\n        <p>It's ready to go — no setup needed. Copy it into your email client below. Takes about 30 seconds.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"recip-sig-wrap\">\n        <div id=\"recip-sig\" class=\"sig\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"recip-actions\">\n        <button class=\"primary\" id=\"r-copy\">Copy signature<\u002Fbutton>\n        <button class=\"secondary\" id=\"r-png\">Download as PNG<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"howto\">\n        <h3>How to install it<\u002Fh3>\n        <div class=\"cols\">\n          <div>\n            <h4>Gmail<\u002Fh4>\n            <ol>\n              <li>Click <b>Copy signature<\u002Fb> above.<\u002Fli>\n              <li>Open Gmail → <b>Settings (gear)<\u002Fb> → <b>See all settings<\u002Fb>.<  const cx = c.getContext('2d');\n      cx.fillStyle = '#ffffff'; cx.fillRect(0,0,cw,ch);\n      cx.drawImage(img, 0, 0, cw, ch);\n      logoDataUrl = c.toDataURL('image/jpeg', 0.82);\n    } catch(e){ logoDataUrl = LOGO_DATA_URL; }\n  })();\n\n  function buildInlineSig(d){\n    const accent = BRAND.accent, ink = BRAND.ink, muted = BRAND.muted;\n    const fam = `font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;`;\n    const liHref = normLinkedIn(d.linkedin);\n    const webHref = \"https://\" + BRAND.website.replace(/^https?:\\/\\//,'');\n    const photo = d.photo\n      ? `<img src=\"${d.photo}\" width=\"118\" height=\"118\" alt=\"\" style=\"display:block;width:118px;height:118px;border-radius:50%;object-fit:cover;\" />`\n      : '';\n    const contactLine = (href, label, color, bold) =>\n      `<div style=\"margin:0 0 7px;\"><a href=\"${escapeHtml(href)}\" style=\"color:${color};text-decoration:none;${bold?'font-weight:700;':''}\">${escapeHtml(label)}<\u002Fa><\u002Fdiv>`;\n    let contacts = '';\n    if (d.email) contacts += contactLine('mailto:'+d.email, d.email, muted, false);\n    if (d.phone) contacts += contactLine('tel:'+cleanPhone(d.phone), d.phone, muted, false);\n    if (liHref)  contacts += contactLine(liHref, linkedInLabel(liHref), muted, false);\n    contacts += `<div><a href=\"${escapeHtml(webHref)}\" style=\"color:${accent};text-decoration:none;font-weight:700;\">${escapeHtml(BRAND.website)}<\u002Fa><\u002Fdiv>`;\n    if (d.booking) contacts += `<div style=\"margin-top:11px;\"><a href=\"${escapeHtml(normUrl(d.booking))}\" style=\"display:inline-block;background:${accent};color:#ffffff;text-decoration:none;font-weight:700;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:9px 16px;border-radius:999px;\">Book a call with me<\u002Fa><\u002Fdiv>`;\n\n    return `\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"${fam}border-collapse:collapse;color:${ink};\">\n<tr>\n${photo ? `<td style=\"vertical-align:middle;padding-right:22px;\">${photo}<\u002Ftd>` : ''}\n<td style=\"vertical-align:middle;padding-right:22px;border-right:1.5px solid ${accent};\">\n<div style=\"font-weight:800;font-size:18px;letter-spacing:0.03em;line-height:1.05;margin:0 0 7px;\">${escapeHtml(d.name)}<\u002Fdiv>\n<div style=\"font-weight:700;font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:${accent};margin:0 0 ${d.dept?'5px':'6px'};\">${escapeHtml(d.role)}<\u002Fdiv>\n${d.dept ? `<div style=\"font-size:12px;color:${muted};margin:0 0 6px;\">${escapeHtml(d.dept)}<\u002Fdiv>` : ''}\n<div style=\"font-weight:600;font-size:13px;color:${ink};margin:0;\">${escapeHtml(BRAND.company)}<\u002Fdiv>\n<\u002Ftd>\n<td style=\"vertical-align:middle;padding-left:22px;font-size:13px;line-height:1.5;\">\n${contacts}\n<\u002Ftd>\n<\u002Ftr>\n${logoDataUrl ? `<tr><td colspan=\"3\" style=\"padding-top:14px;\"><div style=\"height:1.5px;background:${accent};line-height:1.5px;font-size:0;margin-bottom:12px;\">&nbsp;<\u002Fdiv><img src=\"${logoDataUrl}\" alt=\"${escapeHtml(BRAND.company)}\" style=\"display:block;width:200px;height:auto;\" /><\u002Ftd><\u002Ftr>` : ''}\n<\u002Ftable>`.trim();\n  }\n\n  /* ===================== copy helpers ===================== */\n  async function copyRichHtml(html){\n    try {\n      if (navigator.clipboard && window.ClipboardItem){\n        await navigator.clipboard.write([new ClipboardItem({\n          'text/html': new Blob([html], {type:'text/html'}),\n          'text/plain': new Blob([html], {type:'text/plain'})\n        })]);\n        return true;\n      }\n    } catch(e){}\n    try {\n      const holder = document.createElement('div');\n      holder.contentEditable = 'true'; holder.innerHTML = html;\n      holder.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';\n      document.body.appendChild(holder);\n      const range = document.createRange(); range.selectNodeContents(holder);\n      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);\n      const ok = document.execCommand('copy');\n      sel.removeAllRanges(); holder.remove();\n      return ok;\n    } catch(e){ return false; }\n  }\n  async function copyText(t){\n    try { await navigator.clipboard.writeText(t); return true; } catch(e){}\n    try {\n      const ta = document.createElement('textarea'); ta.value = t;\n      ta.style.cssText='position:fixed;left:-9999px;top:0;'; document.body.appendChild(ta);\n      ta.select(); const ok = document.execCommand('copy'); ta.remove(); return ok;\n    } catch(e){ return false; }\n  }\n  function flash(btn, msg, ms=2200){\n    const o = btn.textContent; btn.textContent = msg;\n    setTimeout(()=> btn.textContent = o, ms);\n  }\n  async function downloadPng(sigEl, name){\n    const dataUrl = await htmlToImage.toPng(sigEl, { pixelRatio: 2, backgroundColor:'#ffffff' });\n    const a = document.createElement('a');\n    a.href = dataUrl;\n    a.download = (name||'signature').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-signature.png';\n    a.click();\n  }\n\n  (function(){ var bl = document.getElementById(\"brand-logo\"); if (bl) bl.src = LOGO_DATA_URL; })();\n\n  /* ===================== MODE SWITCH ===================== */\n  const hash = location.hash.replace(/^#/, '');\n  const m = hash.match(/(?:^|&)d=([^&]+)/);\n  if (m){\n    try { initRecipient(decodeData(m[1])); }\n    catch(e){ console.error('bad link', e); initBuilder(); }\n  } else {\n    initBuilder();\n  }\n\n  /* ===================== RECIPIENT MODE ===================== */\n  function initRecipient(data){\n    document.body.setAttribute('data-mode','recipient');\n    const sigEl = $('#recip-sig');\n    renderSig(sigEl, data);\n    const first = (data.name||'').trim().split(/\\s+/)[0];\n    $('#recip-greeting').textContent = first ? `Hi ${first} — here's your email signature` : `Here's your email signature`;\n\n    $('#r-copy').addEventListener('click', async (e) => {\n      const ok = await copyRichHtml(buildInlineSig(data));\n      flash(e.currentTarget, ok ? 'Copied! Now paste into your email settings' : 'Press Cmd/Ctrl+C to copy', 2600);\n    });\n    $('#r-png').addEventListener('click', async (e) => {\n      const b = e.currentTarget; const o = b.textContent; b.textContent = 'Rendering…';\n      try { await downloadPng(sigEl, data.name); } catch(err){ alert('PNG export failed: '+err.message); }\n      b.textContent = o;\n    });\n  }\n\n  /* ===================== BUILDER MODE ===================== */\n  function initBuilder(){\n    document.body.setAttribute('data-mode','builder');\n\n    const fields = {\n      name: $('#f-name'), role: $('#f-role'), dept: $('#f-dept'),\n      email: $('#f-email'), phone: $('#f-phone'), linkedin: $('#f-linkedin'),\n      booking: $('#f-booking')\n    };\n    const previewSig = $('#preview-sig');\n\n    // ---- photo crop state ----\n    const stage = $('#stage'), srcImg = $('#src-img'), zoomInput = $('#zoom'),\n          fileInput = $('#file');\n    const crop = { scale: 0.4, tx: 0, ty: 0 };\n    let hasPhoto = false;\n\n    const avatarCanvas = document.createElement('canvas');\n    avatarCanvas.width = AVATAR_PX; avatarCanvas.height = AVATAR_PX;\n    const actx = avatarCanvas.getContext('2d');\n    let avatarDataUrl = null;\n\n    function collect(){\n      return {\n        name: fields.name.value.trim(),\n        role: fields.role.value.trim(),\n        dept: fields.dept.value.trim(),\n        email: fields.email.value.trim(),\n        phone: fields.phone.value.trim(),\n        linkedin: fields.linkedin.value.trim(),\n        booking: fields.booking.value.trim(),\n        photo: avatarDataUrl\n      };\n    }\n    function refreshPreview(){ renderSig(previewSig, collect()); }\n\n    function applyTransform(){\n      srcImg.style.transform = `translate(${crop.tx}px, ${crop.ty}px) scale(${crop.scale})`;\n      zoomInput.value = crop.scale;\n      bakeAvatar();\n    }\n    function bakeAvatar(){\n      if (!hasPhoto || !srcImg.naturalWidth){ avatarDataUrl = null; refreshPreview(); return; }\n      const srcX = -crop.tx / crop.scale, srcY = -crop.ty / crop.scale;\n      const srcW = STAGE_SIZE / crop.scale;\n      actx.clearRect(0,0,AVATAR_PX,AVATAR_PX);\n      actx.drawImage(srcImg, srcX, srcY, srcW, srcW, 0, 0, AVATAR_PX, AVATAR_PX);\n      // grayscale (locked house style)\n      try {\n        const id = actx.getImageData(0,0,AVATAR_PX,AVATAR_PX), dn = id.data;\n        for (let i=0;i<dn.length;i+=4){ const y = 0.2126*dn[i]+0.7152*dn[i+1]+0.0722*dn[i+2]; dn[i]=dn[i+1]=dn[i+2]=y; }\n        actx.putImageData(id,0,0);\n      } catch(e){}\n      avatarDataUrl = avatarCanvas.toDataURL('image/jpeg', 0.72);\n      refreshPreview();\n    }\n    function fitDefault(){\n      const iw = srcImg.naturalWidth, ih = srcImg.naturalHeight; if (!iw) return;\n      crop.scale = STAGE_SIZE / Math.min(iw, ih);\n      crop.tx = (STAGE_SIZE - iw*crop.scale)/2;\n      crop.ty = (STAGE_SIZE - ih*crop.scale)/2;\n      applyTransform();\n    }\n    srcImg.addEventListener('load', () => { if (hasPhoto) fitDefault(); });\n\n    // drag\n    let dragging=false, sx=0, sy=0, sTx=0, sTy=0;\n    stage.addEventListener('pointerdown', e => {\n      if (!hasPhoto) return;\n      dragging=true; stage.setPointerCapture(e.pointerId);\n      sx=e.clientX; sy=e.clientY; sTx=crop.tx; sTy=crop.ty;\n    });\n    stage.addEventListener('pointermove', e => {\n      if (!dragging) return;\n      crop.tx = sTx + (e.clientX-sx); crop.ty = sTy + (e.clientY-sy);\n      applyTransform();\n    });\n    stage.addEventListener('pointerup', e => { dragging=false; try{stage.releasePointerCapture(e.pointerId);}catch(_){} });\n    stage.addEventListener('wheel', e => {\n      if (!hasPhoto) return;\n      e.preventDefault();\n      const r = stage.getBoundingClientRect();\n      const px=e.clientX-r.left, py=e.clientY-r.top;\n      const ux=(px-crop.tx)/crop.scale, uy=(py-crop.ty)/crop.scale;\n      const f = Math.exp(-e.deltaY*0.001);\n      crop.scale = Math.max(0.02, Math.min(6, crop.scale*f));\n      crop.tx = px-ux*crop.scale; crop.ty = py-uy*crop.scale;\n      applyTransform();\n    }, {passive:false});\n    zoomInput.addEventListener('input', () => {\n      if (!hasPhoto) return;\n      const ns = parseFloat(zoomInput.value), cx=STAGE_SIZE/2, cy=STAGE_SIZE/2;\n      const ux=(cx-crop.tx)/crop.scale, uy=(cy-crop.ty)/crop.scale;\n      crop.scale = ns; crop.tx = cx-ux*crop.scale; crop.ty = cy-uy*crop.scale;\n      applyTransform();\n    });\n\n    function loadPhotoFile(f){\n      if (!f) return;\n      const reader = new FileReader();\n      reader.onload = () => { hasPhoto = true; stage.classList.remove('empty'); srcImg.src = reader.result; };\n      reader.readAsDataURL(f);\n    }\n    fileInput.addEventListener('change', () => loadPhotoFile(fileInput.files[0]));\n    // drag & drop onto stage\n    ['dragover','dragenter'].forEach(ev => stage.addEventListener(ev, e => { e.preventDefault(); }));\n    stage.addEventListener('drop', e => {\n      e.preventDefault();\n      const f = e.dataTransfer.files && e.dataTransfer.files[0];\n      if (f && f.type.startsWith('image/')) loadPhotoFile(f);\n    });\n\n    // ---- live preview wiring ----\n    Object.values(fields).forEach(inp => inp.addEventListener('input', refreshPreview));\n    refreshPreview();\n\n    // ---- generate link ----\n    const linkout = $('#linkout'), linkField = $('#link-field'), linkSize = $('#link-size');\n    const baseField = $('#f-base'), baseHint = $('#base-hint');\n    let currentLink = '';\n    let currentPayload = '';\n\n    // remember the published URL across sessions\n    const BASE_KEY = 'tm-sig-base-url';\n    try { baseField.value = localStorage.getItem(BASE_KEY) || ''; } catch(e){}\n    function checkBase(){\n      const v = (baseField.value||'').trim();\n      const isPreview = /claudeusercontent\\.com|\\/serve\\b/i.test(location.host + location.pathname);\n      if (!v && isPreview){\n        baseHint.innerHTML = '<b style=\"color:var(--accent);\">⚠ Set this before sharing.<\u002Fb> Right now links would point at this private editor and show “preview token required” to your team.';\n      } else if (!v){\n        baseHint.textContent = 'Set this once. Share links are built from it, so they open for your teammates instead of this private editor.';\n      } else {\n        baseHint.innerHTML = 'Links will point to <b>' + escapeHtml(v.split('#')[0]) + '<\u002Fb>';\n      }\n    }\n    baseField.addEventListener('input', () => {\n      try { localStorage.setItem(BASE_KEY, baseField.value.trim()); } catch(e){}\n      checkBase();\n    });\n    checkBase();\n\n    function baseUrl(){\n      const override = (baseField.value || '').trim();\n      if (override) return override.split('#')[0];\n      return location.origin + location.pathname;\n    }\n\n    $('#gen-btn').addEventListener('click', () => {\n      const d = collect();\n      if (!d.name){ fields.name.focus(); flash($('#gen-btn'),'Add a name first'); return; }\n      const payload = encodeData(d);\n      currentPayload = payload;\n      currentLink = baseUrl() + '#d=' + payload;\n      linkField.value = currentLink;\n      const kb = Math.round(currentLink.length/1024*10)/10;\n      linkSize.textContent = `Link size: ${kb} KB` + (currentLink.length > 30000 ? ' · long — try zooming the photo out a touch' : '');\n      linkout.classList.add('show');\n      linkField.focus(); linkField.select();\n    });\n\n    $('#copy-link').addEventListener('click', async (e) => {\n      if (!currentLink) return;\n      const ok = await copyText(currentLink);\n      flash(e.currentTarget, ok ? 'Copied!' : 'Select & copy', 1800);\n    });\n    $('#open-preview').addEventListener('click', () => {\n      // always preview from the real local URL so it works before publishing\n      if (currentPayload) window.open(location.origin + location.pathname + '#d=' + currentPayload, '_blank');\n    });\n\n    // ---- roster (session progress list) ----\n    const ROSTER_KEY = 'tm-sig-roster-v1';\n    const rosterList = $('#roster-list'), rosterEmpty = $('#roster-empty');\n    function getRoster(){ try { return JSON.parse(localStorage.getItem(ROSTER_KEY)||'[]'); } catch(e){ return []; } }\n    function setRoster(arr){ try { localStorage.setItem(ROSTER_KEY, JSON.stringify(arr)); } catch(e){} renderRoster(); }\n    function renderRoster(){\n      const arr = getRoster();\n      rosterList.innerHTML = '';\n      rosterEmpty.style.display = arr.length ? 'none' : 'block';\n      arr.forEach((p, i) => {\n        const li = document.createElement('li');\n        li.innerHTML = `\n          <span class=\"pill\">${i+1}<\u002Fspan>\n          <span class=\"grow\"><span class=\"rname\">${escapeHtml(p.name)}<\u002Fspan><br><span class=\"rrole\">${escapeHtml(p.role||'')}<\u002Fspan><\u002Fspan>\n          <button class=\"btn-ghost r-copy\">Copy link<\u002Fbutton>\n          <button class=\"btn-ghost r-del\">✕<\u002Fbutton>`;\n        li.querySelector('.r-copy').addEventListener('click', async (e) => {\n          const ok = await copyText(p.link); flash(e.currentTarget, ok?'Copied!':'Err', 1500);\n        });\n        li.querySelector('.r-del').addEventListener('click', () => {\n          const cur = getRoster(); cur.splice(i,1); setRoster(cur);\n        });\n        rosterList.appendChild(li);\n      });\n    }\n    $('#save-roster').addEventListener('click', (e) => {\n      const d = collect();\n      if (!currentLink || !d.name) return;\n      const arr = getRoster();\n      const idx = arr.findIndex(p => p.name.toLowerCase() === d.name.toLowerCase());\n      const entry = { name: d.name, role: d.role, link: currentLink };\n      if (idx >= 0) arr[idx] = entry; else arr.push(entry);\n      setRoster(arr);\n      flash(e.currentTarget, idx>=0 ? 'Updated in list' : 'Added to list', 1600);\n    });\n    $('#clear-roster').addEventListener('click', () => {\n      if (confirm('Clear the whole list? (Links you already sent still work.)')) setRoster([]);\n    });\n    $('#clear-form').addEventListener('click', () => {\n      Object.values(fields).forEach(f => f.value = '');\n      hasPhoto = false; avatarDataUrl = null; srcImg.removeAttribute('src');\n      stage.classList.add('empty');\n      crop.scale = 0.4; crop.tx = 0; crop.ty = 0;\n      currentLink = ''; linkField.value = ''; linkout.classList.remove('show');\n      refreshPreview(); fields.name.focus();\n    });\n    renderRoster();\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
